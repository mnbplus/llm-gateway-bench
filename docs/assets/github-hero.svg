<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1220" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E3"/>
      <stop offset="0.52" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#E8FFF8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF7A45"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1240" height="600" rx="32" fill="url(#bg)"/>
  <rect x="20" y="20" width="1240" height="600" rx="32" stroke="#D8E1F2" stroke-width="2"/>

  <circle cx="1060" cy="106" r="88" fill="#FFE1D5" opacity="0.85"/>
  <circle cx="1148" cy="470" r="114" fill="#D9F7EE" opacity="0.95"/>
  <circle cx="875" cy="560" r="70" fill="#DCE9FF" opacity="0.85"/>

  <rect x="70" y="72" width="168" height="38" rx="19" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="154" y="96" text-anchor="middle" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">CLI benchmark suite</text>

  <text x="72" y="178" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">Measure real LLM latency</text>
  <text x="72" y="242" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">before you trust the brochure</text>

  <text x="74" y="300" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">
    Compare providers, relays, regions, and self-hosted endpoints
  </text>
  <text x="74" y="334" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">
    with TTFT, p95, throughput, warmup checks, and saved history.
  </text>

  <rect x="72" y="384" width="122" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="133" y="410" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">TTFT</text>
  <rect x="206" y="384" width="114" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="263" y="410" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">p95</text>
  <rect x="332" y="384" width="168" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="416" y="410" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">throughput</text>
  <rect x="512" y="384" width="128" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="576" y="410" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">YAML</text>
  <rect x="652" y="384" width="136" height="42" rx="21" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="720" y="410" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">history</text>

  <rect x="72" y="466" width="270" height="94" rx="24" fill="#FFFDF8" stroke="#E2E8F0"/>
  <text x="100" y="504" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Best for provider selection</text>
  <text x="100" y="535" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">OpenAI, Anthropic, Gemini,</text>
  <text x="100" y="560" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">Groq, DeepSeek, OpenRouter</text>

  <rect x="358" y="466" width="250" height="94" rx="24" fill="#FFFDF8" stroke="#E2E8F0"/>
  <text x="386" y="504" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Works with gateways</text>
  <text x="386" y="535" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">Any OpenAI-compatible base URL,</text>
  <text x="386" y="560" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">plus Ollama, vLLM, LM Studio</text>

  <rect x="760" y="78" width="450" height="484" rx="28" fill="url(#panel)"/>
  <rect x="760" y="78" width="450" height="484" rx="28" stroke="#334155"/>

  <circle cx="796" cy="113" r="7" fill="#FB7185"/>
  <circle cx="821" cy="113" r="7" fill="#FBBF24"/>
  <circle cx="846" cy="113" r="7" fill="#34D399"/>
  <text x="888" y="119" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="18">llm-gateway-bench</text>

  <text x="792" y="168" fill="#93C5FD" font-family="Consolas, 'Courier New', monospace" font-size="22">$ lgb compare example-bench.yaml</text>
  <text x="792" y="200" fill="#CBD5E1" font-family="Consolas, 'Courier New', monospace" font-size="20">--output report.md --save</text>

  <rect x="792" y="232" width="386" height="206" rx="18" fill="#08111F" stroke="#1E293B"/>
  <text x="818" y="268" fill="#E2E8F0" font-family="Consolas, 'Courier New', monospace" font-size="18">provider     ttft   total   tok/s</text>
  <text x="818" y="305" fill="#F8FAFC" font-family="Consolas, 'Courier New', monospace" font-size="18">openai        198    1240    94.5</text>
  <text x="818" y="338" fill="#F8FAFC" font-family="Consolas, 'Courier New', monospace" font-size="18">anthropic     312    1680    76.2</text>
  <text x="818" y="371" fill="#F8FAFC" font-family="Consolas, 'Courier New', monospace" font-size="18">gemini        280    1520    82.1</text>
  <text x="818" y="404" fill="#F8FAFC" font-family="Consolas, 'Courier New', monospace" font-size="18">groq           95     880   210.5</text>

  <rect x="819" y="454" width="115" height="46" rx="23" fill="url(#accent)"/>
  <text x="876" y="483" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">TTFT</text>
  <text x="980" y="474" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">95 ms</text>
  <text x="980" y="500" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">best provider in run</text>

  <rect x="792" y="522" width="170" height="18" rx="9" fill="#172033"/>
  <rect x="792" y="522" width="138" height="18" rx="9" fill="url(#green)"/>
  <text x="978" y="537" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">history saved</text>
</svg>
